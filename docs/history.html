<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>History — BP Helper</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <div class="space-y">
            <h1 style="font-size:22px;font-weight:700">History</h1>
            <div id="readings-section"></div>
            <div id="sessions-section"></div>
        </div>
    </main>

    <a href="log.html" class="fab">+</a>

    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                Home
            </a>
            <a href="breathe.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3C6.5 3 2 6.58 2 11a7.5 7.5 0 004 6.65V21l3.5-2.14A10.8 10.8 0 0012 19c5.5 0 10-3.58 10-8s-4.5-8-10-8z"/></svg>
                Breathe
            </a>
            <span class="nav-item" style="width:56px"></span>
            <a href="history.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                History
            </a>
            <a href="log.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Profile
            </a>
        </div>
    </nav>

    <script src="js/app.js"></script>
    <script>
    function render() {
        const readings = DB.getReadings(100);
        const sessions = DB.getSessions(50);

        let rhtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">BP Readings</span>
            <span style="font-size:12px;color:var(--text-light)">${readings.length} total</span></div>`;

        if (readings.length) {
            rhtml += '<div class="card">';
            for (const r of readings) {
                const bp = classifyBP(r.systolic, r.diastolic);
                rhtml += `<div class="reading-row">
                    <div>
                        <span style="font-size:18px;font-weight:700" class="tabular">${r.systolic}/${r.diastolic}</span>
                        ${r.pulse ? `<span class="text-muted" style="font-size:13px;margin-left:8px">${r.pulse} bpm</span>` : ''}
                        ${r.notes ? `<div class="text-muted" style="font-size:12px;margin-top:2px">${r.notes}</div>` : ''}
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                        <span class="tag" style="background:${bp.bg};color:${bp.color}">${bp.label}</span>
                        <span class="text-light" style="font-size:11px">${fmtDate(r.created_at)}</span>
                    </div>
                </div>`;
            }
            rhtml += '</div>';
        } else {
            rhtml += `<div class="card text-center" style="padding:32px;font-size:14px;color:var(--text-muted)">
                No readings yet. <a href="log.html" style="color:#5b8def;font-weight:600">Log your first.</a></div>`;
        }
        document.getElementById('readings-section').innerHTML = rhtml;

        if (sessions.length) {
            let shtml = '<div style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:8px">Breathing Sessions</div><div class="card">';
            for (const s of sessions) {
                shtml += `<div class="reading-row">
                    <div>
                        <span style="font-size:15px;font-weight:600">${s.exercise_type}</span>
                        <span class="text-muted" style="font-size:13px;margin-left:8px">${(s.duration_seconds/60).toFixed(1)} min</span>
                    </div>
                    <span class="text-light" style="font-size:12px">${fmtDate(s.created_at)}</span>
                </div>`;
            }
            shtml += '</div>';
            document.getElementById('sessions-section').innerHTML = shtml;
        }
    }
    render();
    </script>
</body>
</html>
