<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>BP Helper</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <div id="flash" style="display:none"></div>
        <div class="week-strip" id="week-strip"></div>
        <div id="content" class="space-y"></div>
    </main>

    <a href="log.html" class="fab">+</a>

    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                Home
            </a>
            <a href="breathe.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3C6.5 3 2 6.58 2 11a7.5 7.5 0 004 6.65V21l3.5-2.14A10.8 10.8 0 0012 19c5.5 0 10-3.58 10-8s-4.5-8-10-8z"/></svg>
                Breathe
            </a>
            <span class="nav-item" style="width:56px"></span>
            <a href="history.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                History
            </a>
            <a href="log.html" class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Profile
            </a>
        </div>
    </nav>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
    function render() {
        document.getElementById('week-strip').innerHTML = renderWeekStrip();

        const stats = DB.getStats();
        const readings = DB.getReadings(10);
        const sessions = DB.getSessions(5);
        const trend = DB.getTrend(7);
        const el = document.getElementById('content');
        let html = '';

        if (stats) {
            // BP summary card with ring + macros style
            const bp = classifyBP(stats.avg_systolic, stats.avg_diastolic);
            html += `<div class="card">
                <div style="display:flex;gap:20px;align-items:center">
                    ${bpRingSVG(stats.avg_systolic)}
                    <div style="flex:1" class="space-y-sm">
                        <div class="macro-row">
                            <span class="macro-dot" style="background:#ef4444"></span>
                            <span class="macro-name">Systolic</span>
                            <span class="macro-val">${stats.avg_systolic} avg</span>
                        </div>
                        ${animBar(stats.avg_systolic/180*100, '#ef4444', 0.2)}
                        <div class="macro-row">
                            <span class="macro-dot" style="background:#3b82f6"></span>
                            <span class="macro-name">Diastolic</span>
                            <span class="macro-val">${stats.avg_diastolic} avg</span>
                        </div>
                        ${animBar(stats.avg_diastolic/120*100, '#3b82f6', 0.35)}
                        ${stats.avg_pulse ? `
                        <div class="macro-row">
                            <span class="macro-dot" style="background:#a855f7"></span>
                            <span class="macro-name">Pulse</span>
                            <span class="macro-val">${stats.avg_pulse} bpm</span>
                        </div>
                        ${animBar(stats.avg_pulse/120*100, '#a855f7', 0.5)}` : ''}
                        <div class="macro-row">
                            <span class="macro-dot" style="background:${bp.color}"></span>
                            <span class="macro-name">Status</span>
                            <span class="tag" style="background:${bp.bg};color:${bp.color}">${bp.label}</span>
                        </div>
                    </div>
                </div>
            </div>`;

            // Trend chart
            if (trend.length > 1) {
                html += `<div class="card">
                    <div style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;font-weight:600">7-Day Trend</div>
                    <canvas id="trendChart" height="140"></canvas>
                </div>`;
            }

            // Quick breathe CTA
            html += `<a href="breathe.html?ex=slow-bp" class="btn-accent" style="text-decoration:none">Start Breathing Session</a>`;

            html += `<a href="breathe.html" class="btn-secondary">
                <span>Browse Exercises</span>
                <span class="arrow">&rarr;</span>
            </a>`;

            // Recent readings
            html += '<div class="card"><div style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;font-weight:600">Recent</div>';
            for (const r of readings.slice(0, 5)) {
                const rbp = classifyBP(r.systolic, r.diastolic);
                html += `<div class="reading-row">
                    <div>
                        <span style="font-size:18px;font-weight:700" class="tabular">${r.systolic}/${r.diastolic}</span>
                        ${r.pulse ? `<span class="text-muted" style="font-size:13px;margin-left:8px">${r.pulse} bpm</span>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span class="tag" style="background:${rbp.bg};color:${rbp.color}">${rbp.label}</span>
                        <span class="text-light" style="font-size:12px">${fmtDateShort(r.created_at)}</span>
                    </div>
                </div>`;
            }
            html += '</div>';

        } else {
            html += `<div class="card text-center" style="padding:40px 20px">
                <div style="font-size:48px;margin-bottom:12px">&#129657;</div>
                <div style="font-size:18px;font-weight:600;margin-bottom:6px">No readings yet</div>
                <p class="text-muted" style="font-size:14px;margin-bottom:20px">Log your first blood pressure reading to get started.</p>
                <a href="log.html" class="btn-accent" style="text-decoration:none;display:inline-block;width:auto;padding:14px 32px">Log BP Reading</a>
            </div>`;

            html += `<a href="breathe.html?ex=slow-bp" class="btn-accent" style="text-decoration:none">Start Breathing Session</a>`;

            html += `<a href="breathe.html" class="btn-secondary">
                <span>Browse Exercises</span>
                <span class="arrow">&rarr;</span>
            </a>`;
        }

        if (sessions.length) {
            html += '<div class="card"><div style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;font-weight:600">Breathing Sessions</div>';
            for (const s of sessions.slice(0, 3)) {
                html += `<div class="reading-row">
                    <div>
                        <span style="font-size:15px;font-weight:600">${s.exercise_type}</span>
                        <span class="text-muted" style="font-size:13px;margin-left:8px">${(s.duration_seconds/60).toFixed(1)} min</span>
                    </div>
                    <span class="text-light" style="font-size:12px">${fmtDateShort(s.created_at)}</span>
                </div>`;
            }
            html += '</div>';
        }

        el.innerHTML = html;

        // Chart
        if (trend.length > 1) {
            const ctx = document.getElementById('trendChart');
            if (ctx) new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trend.map(t => t.date.slice(5)),
                    datasets: [{
                        label: 'Systolic', data: trend.map(t => t.avg_systolic),
                        borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)', tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: '#ef4444'
                    }, {
                        label: 'Diastolic', data: trend.map(t => t.avg_diastolic),
                        borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#6b7b95', boxWidth: 12, font: { size: 11 } } } },
                    scales: {
                        x: { ticks: { color: '#8e9bb5', font: { size: 10 } }, grid: { color: '#e8ecf3' } },
                        y: { ticks: { color: '#8e9bb5', font: { size: 10 } }, grid: { color: '#e8ecf3' }, suggestedMin: 60, suggestedMax: 160 }
                    }
                }
            });
        }
    }
    render();
    </script>
</body>
</html>
